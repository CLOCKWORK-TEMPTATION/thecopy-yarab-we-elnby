openapi: 3.1.0
info:
  title: Director Copilot Arabic API
  version: 1.0.0
  description: مواصفة OpenAPI أولية لمنصة مساعد إخراجي ذكي للأفلام والمسلسلات العربية.
servers:
  - url: /api/v1
