components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Meta:
      type: object
      properties:
        request_id:
          type: string
        trace_id:
          type: string
        version:
          type: string
          default: v1
      required:
        - request_id
    ErrorDetail:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        retryable:
          type: boolean
      required:
        - code
        - message
        - retryable
    ErrorEnvelope:
      type: object
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"
        meta:
          $ref: "#/components/schemas/Meta"
      required:
        - error
        - meta
    AsyncJobData:
      type: object
      properties:
        workflow_id:
          type: string
        job_type:
          type: string
        status:
          type: string
          enum:
            - queued
            - running
            - waiting_approval
            - succeeded
            - failed
            - cancelled
        status_url:
          type: string
        events_url:
          type: string
      required:
        - workflow_id
        - job_type
        - status
        - status_url
    AsyncJobAccepted:
      type: object
      properties:
        data:
