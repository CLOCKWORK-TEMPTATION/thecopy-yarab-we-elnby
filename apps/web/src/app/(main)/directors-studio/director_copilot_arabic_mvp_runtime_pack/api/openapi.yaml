  - name: recordings
    description: التسجيلات والتفريغ
  - name: continuity
    description: الاستمرارية والديلز
  - name: approvals
    description: الموافقات
  - name: search
    description: البحث الموحد
  - name: editorial
    description: التسليم التحريري
  - name: assets
    description: فحص provenance للأصول
  - name: workflows
    description: متابعة الأعمال غير المتزامنة
paths:
  /projects:
    post:
      summary: إنشاء مشروع
      tags:
        - projects
      responses:
        "400":
          description: طلب غير صالح
