openapi: 3.1.0
info:
  title: Arab Production Budget OS API
  version: 0.1.0
  summary: >
    API for interactive budgeting, approvals, actuals reconciliation,
    and AI-assisted planning for Arab film and TV productions.
  description: >
    This specification covers the core operating system for budgeting Arabic film
    and television productions, with Egyptian-market-first assumptions and
    governance-friendly AI workflows.

jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema

servers:
  - url: https://api.example.com/v1
    description: Production
  - url: https://staging-api.example.com/v1
    description: Staging

security:
  - bearerAuth: []

tags:
  - name: Identity
  - name: MasterData
  - name: Projects
  - name: Files
  - name: Documents
  - name: Scripts
  - name: Breakdown
  - name: Budgets
  - name: Vendors
  - name: RateCards
  - name: Actuals
  - name: Approvals
  - name: Agents
  - name: Reporting
  - name: Audit

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    XTenantId:
      name: X-Tenant-Id
      in: header
      required: true
      description: Active tenant/company context.
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Idempotency key for POST action endpoints.
      schema:
        type: string
        minLength: 8
        maxLength: 200
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DocumentId:
      name: document_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProjectDocumentId:
      name: project_document_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScriptVersionId:
      name: script_version_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SceneId:
      name: scene_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BreakdownItemId:
      name: item_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BudgetId:
      name: budget_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BudgetVersionId:
      name: budget_version_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LineItemId:
      name: line_item_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VendorId:
      name: vendor_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QuoteId:
      name: quote_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RateCardId:
      name: rate_card_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BatchId:
      name: batch_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApprovalTemplateId:
      name: template_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApprovalInstanceId:
      name: instance_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApprovalStepId:
      name: step_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunId:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExportJobId:
      name: export_job_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request payload or query.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated but not allowed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Row version conflict, duplicate creation, or invalid state transition.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unprocessable:
      description: Business validation failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    PaginationMeta:
      type: object
      required:
        - page
        - page_size
        - total_items
        - total_pages
      properties:
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
        total_items:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0

    Meta:
      type: object
      required:
        - request_id
      properties:
        request_id:
          type: string
        row_version:
          type: integer
          minimum: 1
        pagination:
          $ref: "#/components/schemas/PaginationMeta"

    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    StandardResponseBase:
      type: object
      required:
        - meta
      properties:
        meta:
          $ref: "#/components/schemas/Meta"
        error:
          $ref: "#/components/schemas/ApiError"

    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/StandardResponseBase"
        - type: object
          required:
            - error
          properties:
            data:
              type: object
              additionalProperties: false

    UserSummary:
      type: object
      required:
        - id
        - email
        - full_name
        - locale
        - status
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        locale:
          type: string
        status:
          type: string
          enum: [active, invited, suspended, archived]

    Permission:
      type: object
      required:
        - code
        - module
      properties:
        code:
          type: string
        module:
          type: string
        description:
          type: string

    Membership:
      type: object
      required:
        - id
        - tenant_id
        - role_code
        - status
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        role_code:
          type: string
        job_title:
          type: string
        status:
          type: string
          enum: [active, inactive, invited, archived]

    MePayload:
      type: object
      required:
        - user
        - memberships
        - permissions
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/Membership"
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"

    Currency:
      type: object
      required:
        - code
        - name_ar
        - minor_unit
        - is_active
      properties:
        code:
          type: string
          minLength: 3
          maxLength: 3
        name_ar:
          type: string
        name_en:
          type: string
        minor_unit:
          type: integer
        is_active:
          type: boolean

    UnitType:
      type: object
      required:
        - id
        - code
        - name_ar
        - dimension
        - is_active
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name_ar:
          type: string
        name_en:
          type: string
        dimension:
          type: string
        is_active:
          type: boolean

    Department:
      type: object
      required:
        - id
        - code
        - name_ar
        - sort_order
        - is_active
      properties:
        id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
        code:
          type: string
        name_ar:
          type: string
        name_en:
          type: string
        sort_order:
          type: integer
        is_active:
          type: boolean

    CostCode:
      type: object
      required:
        - id
        - department_id
        - code
        - name_ar
        - is_active
      properties:
        id:
          type: string
          format: uuid
        department_id:
          type: string
          format: uuid
        code:
          type: string
        name_ar:
          type: string
        name_en:
          type: string
        default_unit_type_id:
          type: string
          format: uuid
        is_active:
          type: boolean

    TaxProfile:
      type: object
      required:
        - id
        - code
        - name_ar
        - formula_type
        - effective_from
        - status
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name_ar:
          type: string
        name_en:
          type: string
        formula_type:
          type: string
          enum: [simple_rate, composite_rules, exempt, manual]
        formula_json:
          type: object
          additionalProperties: true
        effective_from:
          type: string
          format: date
        effective_to:
          type: string
          format: date
        status:
          type: string
          enum: [active, inactive, archived]

    Season:
      type: object
      required:
        - id
        - season_no
        - status
      properties:
        id:
          type: string
          format: uuid
        season_no:
          type: integer
        title:
          type: string
        status:
          type: string
          enum: [active, archived]

    Episode:
      type: object
      required:
        - id
        - episode_no
        - status
      properties:
        id:
          type: string
          format: uuid
        season_id:
          type: string
          format: uuid
        episode_no:
          type: integer
        title:
          type: string
        planned_minutes:
          type: integer
        status:
          type: string
          enum: [active, archived]

    ShootingBlock:
      type: object
      required:
        - id
        - block_no
        - name
        - status
      properties:
        id:
          type: string
          format: uuid
        block_no:
          type: integer
        name:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          type: string
          enum: [planned, active, completed, archived]

    Project:
      type: object
      required:
        - id
        - title_ar
        - project_type
        - format_type
        - base_currency_code
        - status
      properties:
        id:
          type: string
          format: uuid
        title_ar:
          type: string
        title_en:
          type: string
        project_type:
          type: string
          enum: [film, series, short, season]
        format_type:
          type: string
          enum: [film, series, anthology, other]
        base_currency_code:
          type: string
          minLength: 3
          maxLength: 3
        status:
          type: string
          enum: [draft, active, on_hold, archived]
        start_prep_date:
          type: string
          format: date
        start_shoot_date:
          type: string
          format: date
        end_shoot_date:
          type: string
          format: date
        settings_json:
          type: object
          additionalProperties: true

    ProjectCreateRequest:
      type: object
      required:
        - title_ar
        - project_type
        - format_type
        - base_currency_code
      properties:
        title_ar:
          type: string
        title_en:
          type: string
        project_type:
          type: string
          enum: [film, series, short, season]
        format_type:
          type: string
          enum: [film, series, anthology, other]
        base_currency_code:
          type: string
          minLength: 3
          maxLength: 3
        start_prep_date:
          type: string
          format: date
        start_shoot_date:
          type: string
          format: date
        end_shoot_date:
          type: string
          format: date

    ProjectPatchRequest:
      type: object
      required:
        - row_version
      properties:
        row_version:
          type: integer
          minimum: 1
        title_ar:
          type: string
        title_en:
          type: string
        status:
          type: string
          enum: [draft, active, on_hold, archived]
        start_prep_date:
          type: string
          format: date
        start_shoot_date:
          type: string
          format: date
        end_shoot_date:
          type: string
          format: date
        settings_json:
          type: object
          additionalProperties: true

    ProjectStructure:
      type: object
      required:
        - project
        - seasons
        - episodes
        - shooting_blocks
      properties:
        project:
          $ref: "#/components/schemas/Project"
        seasons:
          type: array
          items:
            $ref: "#/components/schemas/Season"
        episodes:
          type: array
          items:
            $ref: "#/components/schemas/Episode"
        shooting_blocks:
          type: array
          items:
            $ref: "#/components/schemas/ShootingBlock"

    FileUploadInitiateRequest:
      type: object
      required:
        - file_name
        - content_type
        - file_size
        - sha256
      properties:
        file_name:
          type: string
        content_type:
          type: string
        file_size:
          type: integer
          minimum: 1
        sha256:
          type: string
          minLength: 64
          maxLength: 64
        metadata_json:
          type: object
          additionalProperties: true

    FileUploadInitiateResult:
      type: object
      required:
        - upload_url
        - upload_token
        - expires_at
      properties:
        upload_url:
          type: string
          format: uri
        upload_headers:
          type: object
          additionalProperties:
            type: string
        upload_token:
          type: string
        expires_at:
          type: string
          format: date-time
        tentative_document_id:
          type: string
          format: uuid

    FileUploadCompleteRequest:
      type: object
      required:
        - upload_token
      properties:
        upload_token:
          type: string
        row_version:
          type: integer
        final_sha256:
          type: string
          minLength: 64
          maxLength: 64

    Document:
      type: object
      required:
        - id
        - storage_key
        - content_type
        - file_size
        - sha256
        - status
      properties:
        id:
          type: string
          format: uuid
        storage_key:
          type: string
        content_type:
          type: string
        file_size:
          type: integer
          minimum: 0
        sha256:
          type: string
        metadata_json:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [uploaded, parsing, parsed, failed, archived]

    ProjectDocument:
      type: object
      required:
        - id
        - project_id
        - document_id
        - document_type
        - source_filename
        - status
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        document_type:
          type: string
          enum: [script, quote, invoice, contract, permit, other]
        source_filename:
          type: string
        language_code:
          type: string
        version_label:
          type: string
        status:
          type: string
          enum: [active, archived]
        document:
          $ref: "#/components/schemas/Document"

    ProjectDocumentCreateRequest:
      type: object
      required:
        - document_id
        - document_type
        - source_filename
      properties:
        document_id:
          type: string
          format: uuid
        document_type:
          type: string
          enum: [script, quote, invoice, contract, permit, other]
        source_filename:
          type: string
        language_code:
          type: string
        version_label:
          type: string

    ScriptVersion:
      type: object
      required:
        - id
        - project_document_id
        - version_no
        - status
      properties:
        id:
          type: string
          format: uuid
        project_document_id:
          type: string
          format: uuid
        version_no:
          type: integer
        parser_version:
          type: string
        raw_text:
          type: string
        structured_json:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [draft, parsed, reviewed, archived]

    ScriptParseRequest:
      type: object
      required:
        - row_version
      properties:
        row_version:
          type: integer
        parse_mode:
          type: string
          enum: [auto, strict, manual_assist]
          default: auto
        language_hint:
          type: string

    Scene:
      type: object
      required:
        - id
        - scene_no
        - review_status
      properties:
        id:
          type: string
          format: uuid
        episode_id:
          type: string
          format: uuid
        scene_no:
          type: string
        page_start:
          type: number
        page_end:
          type: number
        int_ext:
          type: string
          enum: [INT, EXT, INT_EXT, OTHER]
        time_of_day:
          type: string
          enum: [DAY, NIGHT, DAWN, DUSK, OTHER]
        location_name:
          type: string
        summary:
          type: string
        review_status:
          type: string
          enum: [proposed, accepted, edited, rejected]

    ScenePatchRequest:
      type: object
      required:
        - row_version
      properties:
        row_version:
          type: integer
        episode_id:
          type: string
          format: uuid
        scene_no:
          type: string
        page_start:
          type: number
        page_end:
          type: number
        int_ext:
          type: string
          enum: [INT, EXT, INT_EXT, OTHER]
        time_of_day:
          type: string
          enum: [DAY, NIGHT, DAWN, DUSK, OTHER]
        location_name:
          type: string
        summary:
          type: string
        review_status:
          type: string
          enum: [proposed, accepted, edited, rejected]

    BreakdownItem:
      type: object
      required:
        - id
        - scene_id
        - item_type
        - canonical_name
        - quantity
        - status
      properties:
        id:
          type: string
          format: uuid
        scene_id:
          type: string
          format: uuid
        item_type:
          type: string
          enum:
            - character
            - extra
            - location
            - vehicle
            - animal
            - child
            - stunt
            - vfx
            - sfx
            - prop
            - wardrobe
            - makeup
            - transport
            - accommodation
            - equipment
            - special_requirement
            - other
        canonical_name:
          type: string
        quantity:
          type: string
        unit_type_id:
          type: string
          format: uuid
        attributes_json:
          type: object
          additionalProperties: true
        source_type:
          type: string
          enum: [agent, manual, import]
        confidence_score:
          type: number
          minimum: 0
          maximum: 1
        status:
          type: string
          enum: [proposed, accepted, edited, rejected]

    BreakdownItemCreateRequest:
      type: object
      required:
        - item_type
        - canonical_name
      properties:
        item_type:
          type: string
        canonical_name:
          type: string
        quantity:
          type: string
        unit_type_id:
          type: string
          format: uuid
        attributes_json:
          type: object
          additionalProperties: true

    BreakdownItemPatchRequest:
      type: object
      required:
        - row_version
      properties:
        row_version:
          type: integer
        canonical_name:
          type: string
        quantity:
          type: string
        unit_type_id:
          type: string
          format: uuid
        attributes_json:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [proposed, accepted, edited, rejected]

    BreakdownGenerationRequest:
      type: object
      required:
        - row_version
      properties:
        row_version:
          type: integer
        options:
          type: object
          additionalProperties: true

    Budget:
      type: object
      required:
        - id
        - project_id
        - name
        - status
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [active, archived]
        current_version_id:
          type: string
          format: uuid
        baseline_version_id:
          type: string
          format: uuid

    BudgetCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string

    BudgetVersion:
      type: object
      required:
        - id
        - budget_id
        - version_no
        - label
        - version_type
        - status
      properties:
        id:
          type: string
          format: uuid
        budget_id:
          type: string
          format: uuid
        parent_version_id:
          type: string
          format: uuid
        version_no:
          type: integer
        label:
          type: string
        version_type:
          type: string
          enum: [draft, scenario, baseline, revision]
        scenario_code:
          type: string
        status:
          type: string
          enum: [editing, submitted, approved, rejected, frozen, archived]
        source_script_version_id:
          type: string
          format: uuid
        cpi_month:
          type: string
          format: date
        generated_by:
          type: string
        generated_by_run_id:
          type: string
          format: uuid
        grand_total_egp:
          type: string

    BudgetVersionCreateRequest:
      type: object
      required:
        - label
        - version_type
      properties:
        label:
          type: string
        version_type:
          type: string
          enum: [draft, scenario, baseline, revision]
        scenario_code:
          type: string
        source_script_version_id:
          type: string
          format: uuid
        parent_version_id:
          type: string
          format: uuid

    BudgetDraftGenerationRequest:
      type: object
      required:
        - row_version
        - generation_mode
      properties:
        row_version:
          type: integer
        generation_mode:
          type: string
          enum:
            - from_breakdown_and_rate_cards
            - from_template_only
            - from_previous_project
        options:
          type: object
          additionalProperties: true

    ValidationIssue:
      type: object
      required:
        - id
        - budget_version_id
        - severity
        - rule_code
        - message_ar
        - status
      properties:
        id:
          type: string
          format: uuid
        budget_version_id:
          type: string
          format: uuid
        line_item_id:
          type: string
          format: uuid
        severity:
          type: string
          enum: [info, warning, error, critical]
        rule_code:
          type: string
        message_ar:
          type: string
        details_json:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [open, resolved, ignored]

    BudgetLineItem:
      type: object
      required:
        - id
        - budget_version_id
        - source_type
        - description
        - quantity
        - quoted_currency_code
        - quoted_unit_cost
        - subtotal_egp
        - tax_amount_egp
        - contingency_amount_egp
        - total_egp
        - allocation_scope
        - status
      properties:
        id:
          type: string
          format: uuid
        budget_version_id:
          type: string
          format: uuid
        department_id:
          type: string
          format: uuid
        cost_code_id:
          type: string
          format: uuid
        parent_line_item_id:
          type: string
          format: uuid
