paths:
  /me:
    get:
      tags: [Identity]
      summary: Get current authenticated user context.
      operationId: getMe
      parameters:
        - $ref: "#/components/parameters/XTenantId"
      responses:
        "200":
          description: Current user profile and memberships.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponseBase"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/MePayload"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /currencies:
    get:
      tags: [MasterData]
      summary: List active currencies.
      operationId: listCurrencies
      parameters:
        - $ref: "#/components/parameters/XTenantId"
      responses:
        "200":
          description: Currency list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponseBase"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Currency"

  /unit-types:
    get:
      tags: [MasterData]
      summary: List unit types.
      operationId: listUnitTypes
      parameters:
        - $ref: "#/components/parameters/XTenantId"
      responses:
        "200":
          description: Unit type list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StandardResponseBase"
                  - type: object
