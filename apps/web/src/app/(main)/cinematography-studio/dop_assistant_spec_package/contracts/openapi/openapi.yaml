        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLog"
                  meta:
                    $ref: "#/components/schemas/RequestMeta"
                  error:
                    oneOf:
                      - $ref: "#/components/schemas/ApiError"
                      - type: "null"
                required:
                  - data
                  - meta
                  - error
        "403":
          description: Permission denied
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: "null"
                  meta:
                    $ref: "#/components/schemas/RequestMeta"
                  error:
                    oneOf:
                      - $ref: "#/components/schemas/ApiError"
                      - type: "null"
                required:
                  - data
                  - meta
                  - error
