openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Director of Photography Assistant API
  version: 1.0.0
  summary: API for a web-based assistant platform for cinematography workflows
  description: واجهة برمجية تأسيسية لمنصة مساعد مدير التصوير عبر التحضير والتصوير وما بعد الإنتاج.
servers:
  - url: https://api.example.com
    description: Production
  - url: https://staging-api.example.com
    description: Staging
security:
  - bearerAuth: []
tags:
  - name: identity
  - name: productions
  - name: assets
  - name: scripts
  - name: scenes
  - name: plans
  - name: shooting
  - name: continuity
  - name: post
  - name: agents
  - name: sync
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    OrgIdHeader:
      in: header
      name: X-Org-Id
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      schema:
        type: string
        maxLength: 128
    IfMatch:
      in: header
      name: If-Match
      required: false
      schema:
        type: string
  schemas:
    UUID:
      type: string
      format: uuid
    Timestamp:
      type: string
      format: date-time
    RequestMeta:
      type: object
      properties:
        request_id:
          type: string
        cursor:
          type:
            - string
            - "null"
      required:
        - request_id
        - cursor
    ApiError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
            additionalProperties: true
      required:
        - code
        - message
        - details
    AsyncAccepted:
      type: object
      properties:
        operation_id:
          type: string
        agent_run_id:
          type:
            - string
            - "null"
        status:
          type: string
          enum:
            - queued
            - running
        status_url:
          type: string
      required:
        - operation_id
        - agent_run_id
        - status
        - status_url
    Me:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
        full_name:
          type: string
        memberships:
          type: array
          items:
            type: object
            additionalProperties: true
      required:
        - user_id
        - email
        - full_name
        - memberships
    Production:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - film
            - series
        title_ar:
          type: string
        title_en:
          type:
            - string
            - "null"
        status:
          type: string
          enum:
            - draft
            - prep
            - shooting
            - post
            - archived
        default_language:
          type: string
        default_timezone:
          type: string
        row_version:
          type: integer
        created_at:
          type: string
          format: date-time
      required:
        - id
        - type
        - title_ar
        - title_en
        - status
        - default_language
        - default_timezone
        - row_version
        - created_at
    Episode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        production_id:
          type: string
          format: uuid
        season_number:
          type: integer
        episode_number:
          type: integer
        title:
          type:
            - string
            - "null"
        status:
          type: string
        row_version:
          type: integer
      required:
        - id
        - production_id
        - season_number
        - episode_number
        - title
        - status
        - row_version
    Unit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        production_id:
          type: string
          format: uuid
        name:
          type: string
        unit_type:
          type: string
        status:
          type: string
        row_version:
          type: integer
      required:
        - id
        - production_id
        - name
        - unit_type
        - status
        - row_version
    ProductionDashboard:
      type: object
      properties:
        production:
          $ref: "#/components/schemas/Production"
        counts:
          type: object
          additionalProperties: true
        recent_activity:
          type: array
          items:
            type: object
            additionalProperties: true
        open_approvals:
          type: array
          items:
            type: object
            additionalProperties: true
        open_flags:
          type: array
          items:
            type: object
            additionalProperties: true
      required:
        - production
        - counts
        - recent_activity
        - open_approvals
        - open_flags
    Asset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        production_id:
          type: string
          format: uuid
        asset_kind:
          type: string
          enum:
            - script
            - image
            - video
            - audio
            - pdf
            - otio
            - lut
            - cdl
            - clf
            - note
            - call_sheet
            - other
        filename:
          type: string
        mime_type:
          type: string
        storage_key:
          type: string
        checksum:
          type: string
        file_size:
          type: integer
        language_code:
          type:
            - string
            - "null"
        metadata_json:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - production_id
        - asset_kind
        - filename
        - mime_type
        - storage_key
        - checksum
        - file_size
        - language_code
        - metadata_json
        - created_at
    UploadSession:
      type: object
      properties:
        upload_url:
          type: string
        upload_method:
          type: string
          enum:
            - PUT
            - POST
        upload_headers:
          type: object
          additionalProperties:
            type: string
        expires_at:
          type: string
          format: date-time
        temp_object_key:
          type: string
      required:
        - upload_url
        - upload_method
        - upload_headers
        - expires_at
        - temp_object_key
    AssetLink:
      type: object
      properties:
        id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        entity_type:
          type: string
        entity_id:
          type: string
          format: uuid
        relation_type:
          type: string
        created_at:
          type: string
          format: date-time
      required:
        - id
        - asset_id
        - entity_type
        - entity_id
        - relation_type
        - created_at
    KnowledgeSearchResult:
      type: object
      properties:
        entity_type:
          type: string
        entity_id:
          type: string
          format: uuid
        score:
          type: number
        snippet:
          type: string
        asset_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        metadata:
          type: object
          additionalProperties: true
      required:
        - entity_type
        - entity_id
        - score
        - snippet
        - asset_id
        - metadata
    ScriptDocument:
      type: object
      properties:
        id:
          type: string
          format: uuid
        production_id:
          type: string
          format: uuid
        episode_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        name:
          type: string
        current_version_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        created_at:
          type: string
          format: date-time
      required:
        - id
        - production_id
        - episode_id
        - name
        - current_version_id
        - created_at
    ScriptVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        script_document_id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        version_label:
          type: string
        revision_color:
          type:
            - string
            - "null"
        status:
          type: string
          enum:
            - uploaded
            - parsed
            - reviewed
            - published
            - superseded
        row_version:
          type: integer
        created_at:
          type: string
          format: date-time
      required:
        - id
        - script_document_id
        - asset_id
        - version_label
        - revision_color
        - status
        - row_version
        - created_at
    Scene:
      type: object
      properties:
        id:
          type: string
          format: uuid
        production_id:
          type: string
          format: uuid
        episode_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        canonical_scene_code:
          type: string
        scene_title:
          type:
            - string
            - "null"
        int_ext:
          type:
            - string
            - "null"
        time_of_day:
          type:
            - string
            - "null"
        primary_location_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        status:
          type: string
        current_approved_plan_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        row_version:
          type: integer
      required:
        - id
        - production_id
        - episode_id
        - canonical_scene_code
        - scene_title
        - int_ext
        - time_of_day
        - primary_location_id
        - status
        - current_approved_plan_id
        - row_version
    SceneRevision:
      type: object
      properties:
        id:
          type: string
          format: uuid
        scene_id:
          type: string
          format: uuid
        script_version_id:
          type: string
          format: uuid
        script_scene_number:
          type: string
        script_order:
          type: integer
        page_start:
          type:
            - number
            - "null"
        page_end:
          type:
            - number
            - "null"
        synopsis:
          type:
            - string
            - "null"
        scene_text:
          type:
            - string
            - "null"
        parse_confidence:
          type:
            - number
            - "null"
      required:
        - id
        - scene_id
        - script_version_id
        - script_scene_number
        - script_order
        - page_start
        - page_end
        - synopsis
        - scene_text
        - parse_confidence
    SceneElement:
      type: object
      properties:
        id:
          type: string
          format: uuid
        scene_id:
          type: string
          format: uuid
        scene_revision_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        element_type:
          type: string
        name:
          type: string
        attributes_json:
          type: object
          additionalProperties: true
        source_range_json:
          type: object
          additionalProperties: true
      required:
        - id
        - scene_id
        - scene_revision_id
        - element_type
        - name
        - attributes_json
        - source_range_json
    CoverageRequirement:
      type: object
      properties:
        id:
          type: string
          format: uuid
        requirement_code:
          type: string
        requirement_type:
          type: string
        description:
          type: string
        priority:
          type: string
          enum:
            - low
            - normal
            - high
            - critical
        mandatory:
          type: boolean
      required:
        - id
        - requirement_code
        - requirement_type
        - description
        - priority
        - mandatory
    ScenePlanVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        scene_id:
          type: string
          format: uuid
        version_no:
          type: integer
        based_on_script_version_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - draft
            - in_review
            - approved
            - superseded
            - archived
        visual:
          type: object
          additionalProperties: true
        camera:
          type: object
          additionalProperties: true
        lighting:
          type: object
          additionalProperties: true
        coverage_requirements:
          type: array
          items:
            $ref: "#/components/schemas/CoverageRequirement"
      required:
        - id
        - scene_id
        - version_no
        - based_on_script_version_id
        - status
        - visual
        - camera
        - lighting
        - coverage_requirements
    SceneWorkspace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        canonical_scene_code:
          type: string
        latest_revision:
          $ref: "#/components/schemas/SceneRevision"
        approved_plan:
          oneOf:
            - $ref: "#/components/schemas/ScenePlanVersion"
            - type: "null"
        references:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
        setups:
          type: array
          items:
            $ref: "#/components/schemas/Setup"
        shots:
          type: array
          items:
            $ref: "#/components/schemas/Shot"
        continuity_flags:
          type: array
          items:
            $ref: "#/components/schemas/ContinuityFlag"
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
      required:
        - id
        - canonical_scene_code
        - latest_revision
        - approved_plan
        - references
        - setups
        - shots
        - continuity_flags
        - tasks
    Location:
      type: object
      properties:
        id:
          type: string
          format: uuid
        production_id:
          type: string
          format: uuid
        name:
          type: string
        country:
          type:
            - string
            - "null"
        city:
          type:
            - string
            - "null"
        address:
          type:
            - string
            - "null"
        geo_lat:
          type:
            - number
            - "null"
        geo_lng:
          type:
            - number
            - "null"
        indoor_outdoor:
          type:
            - string
            - "null"
        notes:
          type:
            - string
            - "null"
      required:
        - id
        - production_id
        - name
        - country
        - city
        - address
        - geo_lat
        - geo_lng
        - indoor_outdoor
        - notes
    RecceReport:
      type: object
      properties:
        id:
          type: string
          format: uuid
        location_id:
          type: string
          format: uuid
        recce_date:
          type: string
          format: date
        summary:
          type: string
        constraints_json:
          type: object
          additionalProperties: true
        sun_data_json:
          type: object
          additionalProperties: true
        logistics_json:
          type: object
          additionalProperties: true
      required:
        - id
        - location_id
        - recce_date
        - summary
        - constraints_json
        - sun_data_json
        - logistics_json
    EquipmentItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        production_id:
          type: string
          format: uuid
        item_type:
          type: string
        brand:
          type:
            - string
            - "null"
        model:
          type:
            - string
            - "null"
        serial_no:
          type:
            - string
            - "null"
        inventory_code:
          type:
            - string
            - "null"
        status:
          type: string
        metadata_json:
          type: object
          additionalProperties: true
      required:
        - id
        - production_id
        - item_type
        - brand
        - model
        - serial_no
        - inventory_code
        - status
        - metadata_json
    EquipmentKit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        production_id:
          type: string
          format: uuid
        name:
          type: string
        kit_type:
          type: string
        notes:
          type:
            - string
            - "null"
      required:
        - id
        - production_id
        - name
        - kit_type
        - notes
    ShootingDay:
      type: object
      properties:
        id:
          type: string
          format: uuid
        production_id:
          type: string
          format: uuid
        episode_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        unit_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        day_number:
          type: integer
        shoot_date:
          type: string
          format: date
        call_time:
          type:
            - string
            - "null"
          format: date-time
        wrap_time:
          type:
            - string
            - "null"
          format: date-time
        status:
          type: string
        row_version:
          type: integer
      required:
        - id
        - production_id
        - episode_id
        - unit_id
        - day_number
        - shoot_date
        - call_time
        - wrap_time
        - status
        - row_version
    DaySceneAssignment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        shooting_day_id:
          type: string
          format: uuid
        scene_id:
          type: string
          format: uuid
        sort_order:
          type: integer
        planned_setups:
          type:
            - integer
            - "null"
        notes:
          type:
            - string
            - "null"
      required:
        - id
        - shooting_day_id
        - scene_id
        - sort_order
        - planned_setups
        - notes
    ShootingDayWorkspace:
      type: object
      properties:
        shooting_day:
          $ref: "#/components/schemas/ShootingDay"
        assignments:
          type: array
          items:
            $ref: "#/components/schemas/DaySceneAssignment"
        setups:
          type: array
          items:
            $ref: "#/components/schemas/Setup"
        shots:
          type: array
          items:
            $ref: "#/components/schemas/Shot"
        takes:
          type: array
          items:
            $ref: "#/components/schemas/Take"
      required:
        - shooting_day
        - assignments
        - setups
        - shots
        - takes
    Setup:
      type: object
      properties:
        id:
          type: string
          format: uuid
        scene_id:
          type: string
          format: uuid
        shooting_day_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        setup_code:
          type: string
        origin:
          type: string
          enum:
            - planned
            - adhoc
        description:
          type:
            - string
            - "null"
        status:
          type: string
        camera_axis_json:
          type: object
          additionalProperties: true
        row_version:
          type: integer
      required:
        - id
        - scene_id
        - shooting_day_id
        - setup_code
        - origin
        - description
        - status
        - camera_axis_json
        - row_version
    Shot:
      type: object
      properties:
        id:
          type: string
          format: uuid
        scene_id:
          type: string
          format: uuid
        setup_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        shot_code:
          type: string
        origin:
          type: string
          enum:
            - planned
            - adhoc
        framing:
          type:
            - string
            - "null"
        shot_size:
          type:
            - string
            - "null"
        angle:
          type:
            - string
            - "null"
        movement:
          type:
            - string
            - "null"
        priority:
          type: string
          enum:
            - low
            - normal
            - high
            - critical
        status:
          type: string
        row_version:
          type: integer
      required:
        - id
        - scene_id
        - setup_id
        - shot_code
        - origin
        - framing
        - shot_size
        - angle
        - movement
        - priority
        - status
        - row_version
    Take:
      type: object
      properties:
        id:
          type: string
          format: uuid
        scene_id:
          type: string
          format: uuid
        shot_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        take_number:
          type: integer
        clip_name:
          type: string
        camera_roll:
          type:
            - string
            - "null"
        sound_roll:
          type:
            - string
            - "null"
        timecode_start:
          type:
            - string
            - "null"
        timecode_end:
          type:
            - string
            - "null"
        circle_take:
          type: boolean
        take_quality:
          type:
            - string
            - "null"
        metadata_json:
          type: object
          additionalProperties: true
        row_version:
          type: integer
      required:
        - id
        - scene_id
        - shot_id
        - take_number
        - clip_name
        - camera_roll
        - sound_roll
        - timecode_start
        - timecode_end
        - circle_take
        - take_quality
        - metadata_json
        - row_version
    VoiceSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        production_id:
          type: string
          format: uuid
        shooting_day_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        status:
          type: string
        started_at:
          type: string
          format: date-time
        ended_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
      required:
        - id
        - production_id
        - shooting_day_id
        - status
        - started_at
        - ended_at
    VoiceEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        voice_session_id:
          type: string
          format: uuid
        event_type:
          type: string
        transcript:
          type:
            - string
            - "null"
        intent_json:
          type: object
          additionalProperties: true
        entity_type:
          type:
            - string
            - "null"
        entity_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        created_at:
          type: string
          format: date-time
      required:
        - id
        - voice_session_id
        - event_type
        - transcript
        - intent_json
        - entity_type
        - entity_id
        - created_at
    ContinuityFlag:
      type: object
      properties:
        id:
          type: string
          format: uuid
        scene_id:
          type: string
          format: uuid
        setup_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        shot_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        take_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        flag_type:
          type: string
        severity:
          type: string
        description:
          type: string
        status:
          type: string
        resolution_note:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
      required:
        - id
        - scene_id
        - setup_id
        - shot_id
        - take_id
        - flag_type
        - severity
        - description
        - status
        - resolution_note
        - created_at
    EditorialSequence:
      type: object
      properties:
        id:
          type: string
          format: uuid
        production_id:
          type: string
          format: uuid
        episode_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        asset_id:
          type: string
          format: uuid
        sequence_name:
          type: string
