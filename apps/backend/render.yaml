services:
  - type: web
    name: thecopy-backend
    runtime: node
    buildCommand: "pnpm install && pnpm build || exit 1"
    startCommand: "pnpm run start:prod"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: thecopy-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: thecopy-db
    databaseName: thecopy
    user: thecopy
