name: thecopy

# =========================================================
# تشغيل كامل لمشروع "النسخة" - كل الخدمات بأمر واحد
# =========================================================
# للتشغيل:  docker compose up --build
# للإيقاف:  docker compose down
# لمسح كل شيء:  docker compose down -v
# =========================================================

services:

  # ----------------------------------------------------------
  # قاعدة البيانات الرئيسية - PostgreSQL 16
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: thecopy
      POSTGRES_PASSWORD: thecopy_dev
      POSTGRES_DB: thecopy_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thecopy -d thecopy_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - thecopy-net

  # ----------------------------------------------------------
  # مخزن البيانات السريع - Redis 7
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - thecopy-net

  # ----------------------------------------------------------
  # محرك البحث الدلالي - Weaviate
  # ----------------------------------------------------------
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.4
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviatedata:/var/lib/weaviate
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/v1/.well-known/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - thecopy-net

  # ----------------------------------------------------------
  # محرك البحث المتجهي الظلي - Qdrant
  # ----------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.13.4
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    networks:
      - thecopy-net

  # ----------------------------------------------------------
  # الواجهة الخلفية - Backend (Node.js)
  # ----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env.docker
    security_opt:
      - seccomp=unconfined
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://thecopy:thecopy_dev@postgres:5432/thecopy_dev
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      WEAVIATE_URL: http://weaviate:8080
      WEAVIATE_REQUIRED: "false"
      QDRANT_URL: http://qdrant:6333
      PERSISTENT_MEMORY_INFRA_REQUIRED: "false"
      MEMORY_SYSTEM_ENABLED: "false"
      RUN_DB_PUSH_ON_START: "true"
      FILE_IMPORT_HOST: "0.0.0.0"
      FILE_IMPORT_PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - thecopy-net

  # ----------------------------------------------------------
  # الواجهة الأمامية - Web (Next.js)
  # ----------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://backend-thecopy-production.up.railway.app
        NEXT_PUBLIC_BACKEND_URL: https://backend-thecopy-production.up.railway.app
        NEXT_PUBLIC_FILE_IMPORT_BACKEND_URL: https://backend-thecopy-production.up.railway.app/api/file-extract
        NEXT_PUBLIC_FINAL_REVIEW_BACKEND_URL: https://backend-thecopy-production.up.railway.app/api/final-review
      secrets:
        - tiptap_pro_token
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: "5000"
      HOSTNAME: "0.0.0.0"
      BACKEND_URL: http://backend:3001
      EDITOR_RUNTIME_BASE_URL: http://backend:3001
      FILE_IMPORT_BACKEND_URL: http://backend:3001
      NEXT_PUBLIC_API_URL: https://backend-thecopy-production.up.railway.app
      NEXT_PUBLIC_BACKEND_URL: https://backend-thecopy-production.up.railway.app
      NEXT_PUBLIC_FILE_IMPORT_BACKEND_URL: https://backend-thecopy-production.up.railway.app/api/file-extract
      NEXT_PUBLIC_FINAL_REVIEW_BACKEND_URL: https://backend-thecopy-production.up.railway.app/api/final-review
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - thecopy-net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5000/api/__health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# ----------------------------------------------------------
# الأحجام الدائمة
# ----------------------------------------------------------
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  weaviatedata:
    driver: local
  qdrantdata:
    driver: local

# ----------------------------------------------------------
# الشبكة المشتركة
# ----------------------------------------------------------
networks:
  thecopy-net:
    driver: bridge

secrets:
  tiptap_pro_token:
    file: ./.env.docker
