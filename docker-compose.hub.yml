name: thecopy-hub

services:
  web:
    image: ${THE_COPY_WEB_IMAGE:-docker.io/mohamedaminrad/the-copy-web:codex-e2e-production-readiness}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      HOSTNAME: "0.0.0.0"
      BACKEND_URL: ${THE_COPY_BACKEND_URL:-https://backend-thecopy-production.up.railway.app}
      EDITOR_RUNTIME_BASE_URL: ${THE_COPY_BACKEND_URL:-https://backend-thecopy-production.up.railway.app}
      FILE_IMPORT_BACKEND_URL: ${THE_COPY_FILE_IMPORT_BACKEND_URL:-https://backend-thecopy-production.up.railway.app/api/file-extract}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://backend-thecopy-production.up.railway.app}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://backend-thecopy-production.up.railway.app}
      NEXT_PUBLIC_FILE_IMPORT_BACKEND_URL: ${NEXT_PUBLIC_FILE_IMPORT_BACKEND_URL:-https://backend-thecopy-production.up.railway.app/api/file-extract}
      NEXT_PUBLIC_FINAL_REVIEW_BACKEND_URL: ${NEXT_PUBLIC_FINAL_REVIEW_BACKEND_URL:-https://backend-thecopy-production.up.railway.app/api/final-review}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5000/api/__health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
