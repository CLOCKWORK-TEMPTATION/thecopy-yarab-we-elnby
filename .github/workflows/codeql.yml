name: "CodeQL Advanced Security"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 1 * * 0' # فحص أسبوعي فجر الأحد

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # تهيئة CodeQL مع استبعاد الملفات المسببة للأخطاء
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        # تفعيل القواعد المتقدمة
        queries: security-and-quality
        
        # استثناء ملفات البناء والاختبارات فقط — السكربتات و workers تدخل ضمن الفحص لأنها مصدر فعلي للمخاطر.
        config: |
          paths:
            - 'apps/backend/src'
            - 'apps/web/src'
            - 'packages'
          paths-ignore:
            - '**/node_modules'
            - '**/dist'
            - '**/build'
            - '**/.next'
            - '**/coverage'
            - '**/.turbo'
            - '**/.cache'
            - '**/*.min.js'
            - '**/__tests__'
            - '**/test'
            - '**/*.test.ts'
            - '**/*.test.tsx'
            - '**/*.spec.ts'
            - '**/*.spec.tsx'
            - '**/test-results.json'
            - '**/public'

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
