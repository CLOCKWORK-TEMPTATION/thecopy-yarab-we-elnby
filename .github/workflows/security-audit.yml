name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "10.32.1"

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          TIPTAP_PRO_TOKEN="$(echo "$SECRETS_JSON" | jq -r '.TIPTAP_PRO_TOKEN // empty')"
          if [ -z "$TIPTAP_PRO_TOKEN" ]; then
            echo "Missing TIPTAP_PRO_TOKEN secret"
            exit 1
          fi
          export TIPTAP_PRO_TOKEN
          pnpm install --frozen-lockfile

      - name: Run dependency audit
        run: |
          set -o pipefail
          pnpm audit --audit-level=high --prod 2>&1 | tee dependency-audit.txt

      - name: Upload dependency audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit
          path: dependency-audit.txt
          retention-days: 7
          if-no-files-found: error

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  semgrep-scan:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: returntocorp/semgrep:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep (fail on ERROR findings)
        run: |
          semgrep scan \
            --config .semgrep \
            --config p/typescript \
            --config p/nodejs \
            --config p/secrets \
            --error \
            --severity=ERROR \
            --sarif \
            --output=semgrep.sarif

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep findings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 7
          if-no-files-found: warn

  container-scan:
    name: Container Scan (${{ matrix.component }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: web
            dockerfile: apps/web/Dockerfile
            image: the-copy-web
          - component: backend
            dockerfile: apps/backend/Dockerfile
            image: the-copy-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build container image
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          TIPTAP_PRO_TOKEN="$(echo "$SECRETS_JSON" | jq -r '.TIPTAP_PRO_TOKEN // empty')"
          if [ -z "$TIPTAP_PRO_TOKEN" ]; then
            echo "Missing TIPTAP_PRO_TOKEN secret"
            exit 1
          fi
          export TIPTAP_PRO_TOKEN
          DOCKER_BUILDKIT=1 docker build --secret id=tiptap_pro_token,env=TIPTAP_PRO_TOKEN -t ${{ matrix.image }}:${{ github.sha }} -f ${{ matrix.dockerfile }} .

      - name: Scan image with Trivy (SARIF upload)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.component }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.component }}.sarif

      - name: Enforce Trivy severity gate
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
