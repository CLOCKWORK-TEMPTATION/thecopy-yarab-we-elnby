name: Docker Build and Push

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-web:
    name: Docker (web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify tracked dockerignore
        run: node scripts/ci/check-dockerignore.mjs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/the-copy-web
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Resolve Tiptap token
        id: tiptap
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          token="$(echo "$SECRETS_JSON" | jq -r '.TIPTAP_PRO_TOKEN // empty')"
          if [ -z "$token" ]; then
            echo "Missing TIPTAP_PRO_TOKEN secret"
            exit 1
          fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Preflight build from clean checkout
        env:
          TIPTAP_PRO_TOKEN: ${{ steps.tiptap.outputs.token }}
        run: |
          docker buildx build \
            --load \
            --secret id=tiptap_pro_token,env=TIPTAP_PRO_TOKEN \
            --file apps/web/Dockerfile \
            --tag the-copy-web:preflight \
            .

      - name: Start web verification container
        run: |
          docker run -d \
            --name the-copy-web-preflight \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e PORT=3000 \
            -e HOSTNAME=0.0.0.0 \
            -e NEXT_PUBLIC_API_URL=https://example.com \
            -e NEXT_PUBLIC_BACKEND_URL=https://example.com \
            -e NEXT_PUBLIC_FILE_IMPORT_BACKEND_URL=https://example.com/api/file-extract \
            -e NEXT_PUBLIC_FINAL_REVIEW_BACKEND_URL=https://example.com/api/final-review \
            the-copy-web:preflight

      - name: Verify web runtime health endpoint
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/api/__health; then
              echo ""
              echo "Health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after 120s"
          docker logs the-copy-web-preflight
          exit 1

      - name: Cleanup web verification container
        if: always()
        run: docker rm -f the-copy-web-preflight 2>/dev/null || true

      - name: Build and publish image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          secrets: |
            tiptap_pro_token=${{ steps.tiptap.outputs.token }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-and-push-backend:
    name: Docker (backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify tracked dockerignore
        run: node scripts/ci/check-dockerignore.mjs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/the-copy-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Resolve backend verification secrets
        id: backend_verify
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          gemini_key="$(echo "$SECRETS_JSON" | jq -r '.GEMINI_API_KEY // .GOOGLE_GENAI_API_KEY // .AI_API_KEY // empty')"
          if [ -z "$gemini_key" ]; then
            echo "Missing GEMINI_API_KEY or GOOGLE_GENAI_API_KEY or AI_API_KEY secret"
            exit 1
          fi
          echo "::add-mask::$gemini_key"
          echo "gemini_key=$gemini_key" >> "$GITHUB_OUTPUT"

      - name: Preflight build from clean checkout
        run: |
          docker buildx build \
            --load \
            --file apps/backend/Dockerfile \
            --tag the-copy-backend:preflight \
            .

      - name: Start PostgreSQL for backend verification
        run: docker compose -f docker-compose.infra.yml up -d postgres

      - name: Start backend verification container
        env:
          GEMINI_API_KEY: ${{ steps.backend_verify.outputs.gemini_key }}
        run: |
          docker run -d \
            --name the-copy-backend-preflight \
            --add-host=host.docker.internal:host-gateway \
            -p 3001:3001 \
            -e NODE_ENV=production \
            -e DATABASE_URL=postgresql://thecopy:thecopy_dev@host.docker.internal:5433/thecopy_dev \
            -e JWT_SECRET=docker-build-runtime-secret-at-least-32-characters \
            -e REDIS_ENABLED=false \
            -e MEMORY_SYSTEM_ENABLED=false \
            -e WEAVIATE_REQUIRED=false \
            -e GEMINI_API_KEY="$GEMINI_API_KEY" \
            -e GOOGLE_GENAI_API_KEY="$GEMINI_API_KEY" \
            -e AGENT_REVIEW_MODEL=google-genai:gemini-2.5-flash \
            -e FINAL_REVIEW_MODEL=google-genai:gemini-2.5-flash \
            -e FINAL_REVIEW_MOCK_MODE=success \
            the-copy-backend:preflight

      - name: Verify backend runtime endpoints
        run: |
          BACKEND_HEALTH_BASE_URL=http://127.0.0.1:3001 \
          BACKEND_HEALTH_WAIT_SECONDS=120 \
          BACKEND_HEALTH_PROBE_FILE_EXTRACT=true \
          BACKEND_HEALTH_PROBE_TEXT_EXTRACT=true \
          BACKEND_HEALTH_PROBE_FINAL_REVIEW=true \
          BACKEND_HEALTH_PROBE_FAILURES=true \
          node apps/backend/scripts/verify-runtime-health.mjs

      - name: Dump backend container logs on failure
        if: failure()
        run: |
          echo "::group::backend container inspect"
          docker inspect the-copy-backend-preflight --format \
            '{{.State.Status}} exitCode={{.State.ExitCode}} startedAt={{.State.StartedAt}} finishedAt={{.State.FinishedAt}} error={{.State.Error}}' \
            2>&1 || true
          echo "::endgroup::"
          echo "::group::backend container logs"
          docker logs the-copy-backend-preflight 2>&1 || true
          echo "::endgroup::"
          echo "::group::postgres container logs"
          docker compose -f docker-compose.infra.yml logs postgres 2>&1 || true
          echo "::endgroup::"

      - name: Cleanup backend verification containers
        if: always()
        run: |
          docker rm -f the-copy-backend-preflight 2>/dev/null || true
          docker compose -f docker-compose.infra.yml down -v

      - name: Build and publish image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
